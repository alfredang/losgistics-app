<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none">
  <!-- Background -->
  <rect width="1000" height="500" fill="transparent"/>

  <!-- Grid Lines (subtle) -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="0.5">
    <line x1="0" y1="100" x2="1000" y2="100"/>
    <line x1="0" y1="200" x2="1000" y2="200"/>
    <line x1="0" y1="300" x2="1000" y2="300"/>
    <line x1="0" y1="400" x2="1000" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
  </g>

  <!-- Simplified Continents -->
  <g fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5">
    <!-- North America -->
    <path d="M80,80 L180,60 L260,80 L280,120 L260,180 L220,200 L200,240 L160,260 L140,240 L100,200 L80,160 Z"/>
    <!-- South America -->
    <path d="M200,280 L240,260 L280,280 L300,320 L290,380 L260,420 L230,440 L210,400 L200,340 Z"/>
    <!-- Europe -->
    <path d="M420,80 L480,60 L520,80 L530,120 L510,150 L480,160 L450,140 L430,120 Z"/>
    <!-- Africa -->
    <path d="M430,180 L480,170 L530,190 L550,240 L540,310 L510,370 L470,390 L440,360 L420,300 L420,240 Z"/>
    <!-- Asia -->
    <path d="M540,60 L620,40 L720,50 L800,80 L830,120 L810,170 L760,200 L700,210 L640,200 L580,170 L550,130 Z"/>
    <!-- India -->
    <path d="M640,210 L680,200 L710,230 L700,280 L660,300 L630,270 L630,240 Z"/>
    <!-- Southeast Asia -->
    <path d="M720,220 L760,210 L790,240 L780,280 L750,300 L720,280 L710,250 Z"/>
    <!-- Australia -->
    <path d="M770,340 L830,320 L880,340 L900,380 L880,420 L830,430 L790,410 L770,380 Z"/>
  </g>

  <!-- Shipping Routes (animated dashed lines) -->
  <!-- New York to London -->
  <path class="shipping-route" d="M250,170 Q370,80 470,130"/>
  <!-- London to Dubai -->
  <path class="shipping-route" d="M480,130 Q530,160 600,220" style="animation-delay: 0.5s"/>
  <!-- Dubai to Shanghai -->
  <path class="shipping-route" d="M600,220 Q700,150 780,140" style="animation-delay: 1s"/>
  <!-- Shanghai to Singapore -->
  <path class="shipping-route" d="M780,140 Q790,220 740,280" style="animation-delay: 1.5s"/>
  <!-- Singapore to Sydney -->
  <path class="shipping-route" d="M740,280 Q800,320 840,370" style="animation-delay: 2s"/>
  <!-- New York to São Paulo -->
  <path class="shipping-route" d="M250,170 Q260,280 240,360" style="animation-delay: 0.8s"/>
  <!-- London to Lagos -->
  <path class="shipping-route" d="M470,130 Q460,220 460,300" style="animation-delay: 1.2s"/>

  <!-- City Dots with Pulse Effect -->
  <g>
    <!-- New York -->
    <circle class="map-dot-pulse" cx="250" cy="170" r="5"/>
    <circle class="map-dot" cx="250" cy="170" r="3"/>
    <text x="250" y="160" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9" font-family="Inter, sans-serif">New York</text>

    <!-- London -->
    <circle class="map-dot-pulse" cx="470" cy="130" r="5"/>
    <circle class="map-dot" cx="470" cy="130" r="3"/>
    <text x="470" y="120" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9" font-family="Inter, sans-serif">London</text>

    <!-- Dubai -->
    <circle class="map-dot-pulse" cx="600" cy="220" r="5"/>
    <circle class="map-dot" cx="600" cy="220" r="3"/>
    <text x="600" y="210" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9" font-family="Inter, sans-serif">Dubai</text>

    <!-- Shanghai -->
    <circle class="map-dot-pulse" cx="780" cy="140" r="5"/>
    <circle class="map-dot" cx="780" cy="140" r="3"/>
    <text x="780" y="130" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9" font-family="Inter, sans-serif">Shanghai</text>

    <!-- Singapore -->
    <circle class="map-dot-pulse" cx="740" cy="280" r="5"/>
    <circle class="map-dot" cx="740" cy="280" r="3"/>
    <text x="740" y="270" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9" font-family="Inter, sans-serif">Singapore</text>

    <!-- Sydney -->
    <circle class="map-dot-pulse" cx="840" cy="370" r="5"/>
    <circle class="map-dot" cx="840" cy="370" r="3"/>
    <text x="840" y="360" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9" font-family="Inter, sans-serif">Sydney</text>

    <!-- São Paulo -->
    <circle class="map-dot-pulse" cx="240" cy="360" r="5"/>
    <circle class="map-dot" cx="240" cy="360" r="3"/>
    <text x="240" y="380" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9" font-family="Inter, sans-serif">São Paulo</text>

    <!-- Lagos -->
    <circle class="map-dot-pulse" cx="460" cy="300" r="5"/>
    <circle class="map-dot" cx="460" cy="300" r="3"/>
    <text x="460" y="316" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9" font-family="Inter, sans-serif">Lagos</text>
  </g>
</svg>
